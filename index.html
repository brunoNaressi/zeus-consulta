<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Broadcast Service - Consulta de Equipamentos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0a0a0a;
    color:#f5f5f5;
    font-family:Inter,Segoe UI,sans-serif;
    min-height:100vh;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h1{
    font-size:32px;
    font-weight:600;
    letter-spacing:1px;
}

.subtitulo{
    color:#ff7a00;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:2px;
}

input{
    width:100%;
    padding:18px;
    background:#121212;
    border:1px solid #2a2a2a;
    border-radius:12px;
    color:white;
    font-size:18px;
}

input:focus{
    outline:none;
    border-color:#ff7a00;
}

.card{
    margin-top:25px;
    background:#111;
    border:1px solid #242424;
    border-left:4px solid #ff7a00;
    border-radius:12px;
    padding:25px;
}

.status{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:2px;
    margin-bottom:12px;
    font-weight:700;
}

.modelo{
    font-size:28px;
    margin-bottom:15px;
}

.obs{
    color:#bdbdbd;
    line-height:1.7;
}

.atendemos{color:#22c55e;}
.descontinuado{color:#ffb020;}
.naopegamos{color:#ef4444;}

.footer{
    margin-top:40px;
    padding-top:20px;
    border-top:1px solid #222;
    text-align:center;
    color:#666;
}
.loading{
    text-align:center;
    margin-top:20px;
    color:#ff8c00;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<!-- TROQUE PELO LINK DO SEU LOGO -->
<img class="logo" src="Zeus%20logo.png" alt="Zeus Broadcast Service">

<h1>Consulta de Equipamentos</h1>

<div class="subtitulo">
Zeus Broadcast Service
</div>

</div>

<div class="busca">

<input
type="text"
id="busca"
placeholder="Digite o modelo do equipamento..."
oninput="consultar()">

</div>

<div id="loading" class="loading">
Carregando base de equipamentos...
</div>

<div id="resultado" class="card"></div>

<div class="footer">
Sistema interno Zeus Broadcast Service
</div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSwxpm5HcLltf5R6mFHVFkiFLL9orTwsMqq8zRCe0NNotWDoZ4f38t1qlpdMArCJ3UpOn3xXu2-2m5o/pub?output=csv";

let equipamentos = [];

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

document.getElementById("loading").style.display="none";

const linhas = csv.trim().split("\n");

for(let i=1;i<linhas.length;i++){

const colunas = linhas[i].split(",");

equipamentos.push({

modelo:(colunas[0] || "").trim(),
status:(colunas[1] || "").trim(),
obs:(colunas[2] || "").trim()

});

}

})
.catch(() => {

document.getElementById("loading").innerHTML =
"Erro ao carregar a planilha.";

});

function consultar(){

const termo =
document
.getElementById("busca")
.value
.toLowerCase()
.trim();

const resultado =
document.getElementById("resultado");

if(!termo){

resultado.style.display="none";
return;

}

const encontrados =
equipamentos.filter(item =>
item.modelo.toLowerCase().includes(termo)
);

if(encontrados.length===0){

resultado.style.display="block";

resultado.innerHTML = `
<div class="modelo">
Equipamento não encontrado
</div>

<div class="obs">
Verifique o modelo digitado.
</div>
`;

return;

}

const eq = encontrados[0];

let classe = "naopegamos";

if(eq.status.toLowerCase().includes("atend"))
classe = "atendemos";

if(eq.status.toLowerCase().includes("descontinu"))
classe = "descontinuado";

resultado.style.display="block";

resultado.innerHTML = `
<div class="status ${classe}">
${eq.status}
</div>

<div class="modelo">
${eq.modelo}
</div>

<div class="obs">
${eq.obs}
</div>
`;

}

</script>

</body>
</html>
