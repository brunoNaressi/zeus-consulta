<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeus Broadcast Service - Consulta de Equipamentos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    padding:25px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    width:180px;
    max-width:90%;
}

h1{
    margin-top:15px;
    font-size:2rem;
}

.subtitulo{
    color:#ff8c00;
    margin-top:8px;
}

.busca{
    margin-top:20px;
}

input{
    width:100%;
    padding:18px;
    border-radius:15px;
    border:2px solid #ff8c00;
    background:#111;
    color:white;
    font-size:18px;
    outline:none;
}

input:focus{
    box-shadow:0 0 15px rgba(255,140,0,.4);
}

.card{
    display:none;
    margin-top:25px;
    background:#111;
    border-left:6px solid #ff8c00;
    border-radius:15px;
    padding:25px;
}

.modelo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.status{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.atendemos{
    color:#22c55e;
}

.descontinuado{
    color:#ffb020;
}

.naopegamos{
    color:#ef4444;
}

.obs{
    color:#ddd;
    line-height:1.7;
}

.footer{
    text-align:center;
    margin-top:40px;
    color:#777;
    font-size:14px;
}

.loading{
    text-align:center;
    margin-top:20px;
    color:#ff8c00;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<!-- TROQUE PELO LINK DO SEU LOGO -->
<img
class="logo"
src="https://i.imgur.com/yK9z4cP.png"
alt="Zeus">

<h1>Consulta de Equipamentos</h1>

<div class="subtitulo">
Zeus Broadcast Service
</div>

</div>

<div class="busca">

<input
type="text"
id="busca"
placeholder="Digite o modelo do equipamento..."
oninput="consultar()">

</div>

<div id="loading" class="loading">
Carregando base de equipamentos...
</div>

<div id="resultado" class="card"></div>

<div class="footer">
Sistema interno Zeus Broadcast Service
</div>

</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSwxpm5HcLltf5R6mFHVFkiFLL9orTwsMqq8zRCe0NNotWDoZ4f38t1qlpdMArCJ3UpOn3xXu2-2m5o/pub?output=csv";

let equipamentos = [];

fetch(csvUrl)
.then(response => response.text())
.then(csv => {

document.getElementById("loading").style.display="none";

const linhas = csv.trim().split("\n");

for(let i=1;i<linhas.length;i++){

const colunas = linhas[i].split(",");

equipamentos.push({

modelo:(colunas[0] || "").trim(),
status:(colunas[1] || "").trim(),
obs:(colunas[2] || "").trim()

});

}

})
.catch(() => {

document.getElementById("loading").innerHTML =
"Erro ao carregar a planilha.";

});

function consultar(){

const termo =
document
.getElementById("busca")
.value
.toLowerCase()
.trim();

const resultado =
document.getElementById("resultado");

if(!termo){

resultado.style.display="none";
return;

}

const encontrados =
equipamentos.filter(item =>
item.modelo.toLowerCase().includes(termo)
);

if(encontrados.length===0){

resultado.style.display="block";

resultado.innerHTML = `
<div class="modelo">
Equipamento não encontrado
</div>

<div class="obs">
Verifique o modelo digitado.
</div>
`;

return;

}

const eq = encontrados[0];

let classe = "naopegamos";

if(eq.status.toLowerCase().includes("atend"))
classe = "atendemos";

if(eq.status.toLowerCase().includes("descontinu"))
classe = "descontinuado";

resultado.style.display="block";

resultado.innerHTML = `
<div class="status ${classe}">
${eq.status}
</div>

<div class="modelo">
${eq.modelo}
</div>

<div class="obs">
${eq.obs}
</div>
`;

}

</script>

</body>
</html>
